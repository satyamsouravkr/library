<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="register-container">
        <h2 class="blink-title">Library Registration</h2>
        <form action="register.php" method="POST">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" pattern="[A-Za-z ]+" title="Only letters and spaces are allowed" oninput="this.value = this.value.replace(/[^A-Za-z ]/g, '')">
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter you email id " required/>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter you password" required>
            
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
    <script>
        // Blinking Title Animation
        setInterval(() => {
            document.querySelector(".blink-title").classList.toggle("blink");
        }, 800);
    </script>
    <script src="script.js"></script>
</body>
</html>
